<!-- ═══════════════════════════════════════════════════════════════════════════
     MODERN NAVIGATION HEADER - Clean, Professional Design
     ═══════════════════════════════════════════════════════════════════════════ -->
<header 
  class="header" 
  [class.header--scrolled]="isScrolled()"
  role="banner">
  <div class="header__container">
    <nav class="header__nav" aria-label="Main navigation">
      
      <!-- Logo -->
      <a routerLink="/home" class="header__logo" aria-label="VARS Technosoft Home">
        <div class="header__logo-icon">
          <span>V</span>
        </div>
        <span class="header__logo-text">
          VARS<span class="header__logo-dot">.</span>
        </span>
      </a>

      <!-- Desktop Navigation -->
      <div class="header__links">
        @for (link of navLinks; track link.path) {
          <a 
            [routerLink]="link.path" 
            routerLinkActive="header__link--active"
            class="header__link">
            {{ link.label }}
          </a>
        }
      </div>

      <!-- CTA Button -->
      <div class="header__cta">
        <a routerLink="/contact" class="header__cta-button">
          <span>Get Started</span>
          <svg class="header__cta-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </a>
      </div>

      <!-- Mobile Menu Toggle -->
      <button 
        class="header__mobile-toggle"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="isMobileMenuOpen()"
        aria-controls="mobile-menu"
        aria-label="Toggle navigation menu">
        @if (!isMobileMenuOpen()) {
          <svg class="header__mobile-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        } @else {
          <svg class="header__mobile-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        }
      </button>
    </nav>

    <!-- Mobile Menu -->
    <div 
      id="mobile-menu"
      class="header__mobile-menu"
      [class.header__mobile-menu--open]="isMobileMenuOpen()"
      role="navigation"
      aria-label="Mobile navigation">
      <div class="header__mobile-content">
        @for (link of navLinks; track link.path) {
          <a 
            [routerLink]="link.path" 
            routerLinkActive="header__mobile-link--active"
            (click)="closeMobileMenu()"
            class="header__mobile-link">
            {{ link.label }}
          </a>
        }
        <div class="header__mobile-cta">
          <a routerLink="/contact" (click)="closeMobileMenu()" class="header__cta-button header__cta-button--full">
            Get Started
          </a>
        </div>
      </div>
    </div>
  </div>
</header>
